version: '3.8'

services:
  gateway:
    image: nginx:alpine
    container_name: apex-gateway
    restart: always
    ports:
      - "10000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services:/etc/nginx/conf.d:ro
    networks:
      - apex-internal

networks:
  apex-internal:
    name: apex-internal
    driver: bridge

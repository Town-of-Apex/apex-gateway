server {
    listen 80;
    server_name _;

    # Route for Feedback Management v2
    location /feedback/ {
        # 'feedback-app' must match the service name in the app's docker-compose.yml
        proxy_pass http://feedback-app:8080/; 
        
        # AAS-1.0 specific header for ProxyFix
        proxy_set_header X-Forwarded-Prefix /feedback;
        
        # Handle large file uploads if needed
        client_max_body_size 10M;
    }

    # Add more locations here as you deploy more apps:
    # location /sparks/ {
    #     proxy_pass http://sparks-app:8080/;
    #     proxy_set_header X-Forwarded-Prefix /sparks;
    # }

    # Health check for the gateway itself
    location /health {
        return 200 'Gateway is up';
        add_header Content-Type text/plain;
    }
}

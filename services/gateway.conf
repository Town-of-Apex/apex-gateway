server {
    listen 80;
    server_name _;

    # Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Route for Feedback Management v2
    location /feedback/ {
        set $feedback_upstream http://feedback-app:8080;
        proxy_pass $feedback_upstream/; 
        proxy_set_header X-Forwarded-Prefix /feedback;
        client_max_body_size 10M;
    }

    # Route for Innovation Services Hub
    location /hub/ {
        set $hub_upstream http://innovation-services-hub:8080;
        rewrite ^/hub/(.*) /$1 break;
        proxy_pass $hub_upstream; 
        proxy_set_header X-Forwarded-Prefix /hub;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Add more locations here as you deploy more apps:
    # location /sparks/ {
    #     proxy_pass http://sparks-app:8080/;
    #     proxy_set_header X-Forwarded-Prefix /sparks;
    # }

    # Health check for the gateway itself
    location /health {
        return 200 'Gateway is up';
        add_header Content-Type text/plain;
    }
}
